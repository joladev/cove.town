services:
  garage:
    image: dxflrs/garage:v2.3.0
    restart: always
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    networks:
      default:
      dokploy-network:
        aliases:
          - spindle-logs.garage

volumes:
  garage_meta:
  garage_data:

networks:
  dokploy-network:
    external: true
